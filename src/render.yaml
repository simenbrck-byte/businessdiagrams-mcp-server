services:
  - type: web
    name: github-batch-mcp-server
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: LOG_LEVEL
        value: INFO
      - key: MCP_MOUNT_PATH
        value: /mcp
      - key: INDEX_BASE
        value: "0"
      - key: GITHUB_OWNER
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BRANCH
        value: main
      - key: MANIFEST_PATH
        value: manifests/input_manifest.json
      - key: OUTPUT_FOLDER
        value: output
      - key: GITHUB_TOKEN
        sync: false
    